<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trip Splitter ✈️</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --sand: #F5ECD7;
    --terracotta: #C96A3A;
    --ocean: #1A6B8A;
    --sky: #7EC8D8;
    --night: #12213A;
    --leaf: #3A8A5C;
    --gold: #E8B84B;
    --cream: #FDF8F0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--night);
    min-height: 100vh;
    color: var(--sand);
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 20%, rgba(26,107,138,0.3) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(201,106,58,0.2) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(18,33,58,1) 0%, transparent 100%);
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 820px;
    margin: 0 auto;
    padding: 30px 20px 60px;
  }

  header {
    text-align: center;
    margin-bottom: 40px;
  }

  .emoji-header {
    font-size: 3rem;
    display: block;
    margin-bottom: 8px;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 2.8rem;
    font-weight: 800;
    color: var(--sand);
    letter-spacing: -1px;
    line-height: 1;
  }

  h1 span { color: var(--terracotta); }

  .subtitle {
    margin-top: 8px;
    color: var(--sky);
    font-size: 0.85rem;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* Cards */
  .card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 24px;
    backdrop-filter: blur(10px);
    transition: border-color 0.3s;
  }

  .card:hover { border-color: rgba(255,255,255,0.2); }

  .card-title {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--gold);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* Friends Section */
  .friends-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }

  .friend-tag {
    background: rgba(126,200,216,0.15);
    border: 1px solid var(--sky);
    color: var(--sky);
    padding: 6px 14px;
    border-radius: 50px;
    font-size: 0.85rem;
    display: flex;
    align-items: center;
    gap: 8px;
    animation: popIn 0.3s ease;
  }

  @keyframes popIn {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .friend-tag button {
    background: none;
    border: none;
    color: var(--terracotta);
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    padding: 0;
    transition: transform 0.2s;
  }

  .friend-tag button:hover { transform: scale(1.3); }

  .input-row {
    display: flex;
    gap: 10px;
  }

  input, select {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--sand);
    padding: 10px 16px;
    border-radius: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }

  input:focus, select:focus {
    border-color: var(--sky);
    background: rgba(126,200,216,0.08);
  }

  input::placeholder { color: rgba(245,236,215,0.3); }

  select option { background: var(--night); }

  input[type="text"] { flex: 1; }
  input[type="number"] { width: 120px; }

  /* Expenses */
  .expense-item {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 14px 18px;
    margin-bottom: 10px;
    display: grid;
    grid-template-columns: 1fr auto auto auto;
    gap: 12px;
    align-items: center;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { transform: translateX(-20px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  .expense-desc {
    font-size: 0.9rem;
    color: var(--sand);
  }

  .expense-payer {
    font-size: 0.75rem;
    color: var(--sky);
    background: rgba(126,200,216,0.1);
    padding: 3px 10px;
    border-radius: 50px;
  }

  .expense-amount {
    font-size: 1rem;
    font-weight: 500;
    color: var(--gold);
  }

  .expense-split {
    font-size: 0.7rem;
    color: rgba(245,236,215,0.4);
  }

  .delete-btn {
    background: none;
    border: none;
    color: rgba(201,106,58,0.5);
    cursor: pointer;
    font-size: 1.1rem;
    padding: 0;
    transition: color 0.2s, transform 0.2s;
  }

  .delete-btn:hover { color: var(--terracotta); transform: scale(1.2); }

  /* Split options */
  .split-options {
    display: flex;
    gap: 8px;
    margin: 10px 0;
    flex-wrap: wrap;
  }

  .split-btn {
    padding: 6px 14px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.15);
    background: transparent;
    color: var(--sand);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .split-btn.active {
    background: var(--terracotta);
    border-color: var(--terracotta);
    color: white;
  }

  .split-btn:hover:not(.active) {
    border-color: var(--sky);
    color: var(--sky);
  }

  /* Checkboxes for custom split */
  .participants-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }

  .participant-check {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    padding: 5px 12px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1);
    transition: all 0.2s;
    font-size: 0.82rem;
  }

  .participant-check:hover { border-color: var(--sky); }
  .participant-check input[type="checkbox"] { accent-color: var(--sky); width: 14px; height: 14px; }

  /* Add button */
  .btn-primary {
    background: var(--terracotta);
    color: white;
    border: none;
    padding: 11px 24px;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-primary:hover {
    background: #e07640;
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(201,106,58,0.3);
  }

  .btn-primary:active { transform: translateY(0); }

  .btn-secondary {
    background: transparent;
    color: var(--sky);
    border: 1px solid var(--sky);
    padding: 10px 20px;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }

  .btn-secondary:hover {
    background: rgba(126,200,216,0.1);
    transform: translateY(-1px);
  }

  /* Results */
  .results-card {
    background: linear-gradient(135deg, rgba(58,138,92,0.15), rgba(26,107,138,0.15));
    border: 1px solid rgba(58,138,92,0.4);
  }

  .balance-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    border-radius: 10px;
    margin-bottom: 8px;
    background: rgba(255,255,255,0.03);
    font-size: 0.85rem;
  }

  .balance-name { color: var(--sand); }

  .balance-positive {
    color: var(--leaf);
    font-weight: 500;
  }

  .balance-negative {
    color: var(--terracotta);
    font-weight: 500;
  }

  .balance-zero { color: rgba(245,236,215,0.4); }

  /* Settlements */
  .settlement-item {
    background: rgba(232,184,75,0.08);
    border: 1px solid rgba(232,184,75,0.25);
    border-radius: 12px;
    padding: 14px 18px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    font-size: 0.88rem;
    animation: popIn 0.4s ease;
  }

  .settlement-arrow { color: var(--gold); font-size: 1.2rem; }
  .settlement-amount { color: var(--gold); font-weight: 500; font-size: 1rem; }
  .settlement-from { color: var(--terracotta); }
  .settlement-to { color: var(--sky); }

  /* Summary stats */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }

  .stat-box {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 14px;
    text-align: center;
  }

  .stat-value {
    font-family: 'Syne', sans-serif;
    font-size: 1.4rem;
    font-weight: 800;
    color: var(--gold);
  }

  .stat-label {
    font-size: 0.7rem;
    color: rgba(245,236,215,0.4);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 4px;
  }

  .empty-state {
    text-align: center;
    padding: 30px;
    color: rgba(245,236,215,0.25);
    font-size: 0.85rem;
    letter-spacing: 1px;
  }

  .section-divider {
    height: 1px;
    background: rgba(255,255,255,0.06);
    margin: 20px 0;
  }

  .calculate-section {
    text-align: center;
    margin-top: 10px;
  }

  .form-row {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }

  @media (max-width: 600px) {
    h1 { font-size: 2rem; }
    .expense-item { grid-template-columns: 1fr auto auto; }
    .expense-split { display: none; }
    .stats-row { grid-template-columns: repeat(3, 1fr); }
    .stat-value { font-size: 1rem; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <span class="emoji-header">✈️</span>
    <h1>Trip <span>Splitter</span></h1>
    <p class="subtitle">Who owes who — sorted in seconds</p>
  </header>

  <!-- Friends -->
  <div class="card">
    <div class="card-title">👥 Add Friends</div>
    <div class="friends-row" id="friendsList"></div>
    <div class="input-row">
      <input type="text" id="friendInput" placeholder="Enter friend's name..." maxlength="20" />
      <button class="btn-primary" onclick="addFriend()">+ Add</button>
    </div>
  </div>

  <!-- Add Expense -->
  <div class="card">
    <div class="card-title">💸 Add Expense</div>

    <div class="form-row">
      <input type="text" id="expDesc" placeholder="What was it? (e.g. Hotel, Dinner...)" style="flex:2; min-width:180px;" />
      <input type="number" id="expAmount" placeholder="₹ Amount" min="0" style="width:130px;" />
    </div>

    <div class="form-row" style="align-items:center;">
      <span style="font-size:0.8rem; color:rgba(245,236,215,0.5); white-space:nowrap;">Paid by</span>
      <select id="expPayer" style="flex:1; min-width:140px;"></select>
    </div>

    <div style="margin-bottom:10px;">
      <div style="font-size:0.8rem; color:rgba(245,236,215,0.5); margin-bottom:8px;">Split</div>
      <div class="split-options">
        <button class="split-btn active" onclick="setSplit('all', this)">Equally (all)</button>
        <button class="split-btn" onclick="setSplit('custom', this)">Custom people</button>
      </div>
      <div id="customParticipants" class="participants-grid" style="display:none;"></div>
    </div>

    <button class="btn-primary" onclick="addExpense()" style="width:100%;">＋ Add Expense</button>
  </div>

  <!-- Expenses List -->
  <div class="card">
    <div class="card-title">🧾 Expenses</div>
    <div id="expensesList"><div class="empty-state">No expenses yet — add some above!</div></div>
  </div>

  <!-- Results -->
  <div class="card results-card" id="resultsCard" style="display:none;">
    <div class="card-title">📊 Settlement Summary</div>

    <div class="stats-row" id="statsRow"></div>

    <div style="font-family:'Syne',sans-serif; font-size:0.8rem; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:rgba(245,236,215,0.5); margin-bottom:12px;">Balances</div>
    <div id="balancesList"></div>

    <div class="section-divider"></div>

    <div style="font-family:'Syne',sans-serif; font-size:0.8rem; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:rgba(245,236,215,0.5); margin-bottom:12px;">💡 Who pays who</div>
    <div id="settlementsList"></div>
  </div>

  <div class="calculate-section">
    <button class="btn-primary" onclick="calculate()" style="padding:14px 40px; font-size:1rem;">
      🧮 Calculate Splits
    </button>
    &nbsp;
    <button class="btn-secondary" onclick="resetAll()">Reset All</button>
  </div>

</div>

<script>
let friends = [];
let expenses = [];
let splitMode = 'all';

function addFriend() {
  const input = document.getElementById('friendInput');
  const name = input.value.trim();
  if (!name) return;
  if (friends.includes(name)) { alert('Friend already added!'); return; }
  friends.push(name);
  input.value = '';
  renderFriends();
  updatePayerSelect();
  updateCustomParticipants();
}

document.getElementById('friendInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addFriend();
});

function removeFriend(name) {
  friends = friends.filter(f => f !== name);
  renderFriends();
  updatePayerSelect();
  updateCustomParticipants();
}

function renderFriends() {
  const el = document.getElementById('friendsList');
  if (friends.length === 0) { el.innerHTML = ''; return; }
  el.innerHTML = friends.map(f => `
    <div class="friend-tag">
      ${f}
      <button onclick="removeFriend('${f}')" title="Remove">×</button>
    </div>
  `).join('');
}

function updatePayerSelect() {
  const sel = document.getElementById('expPayer');
  sel.innerHTML = friends.length === 0
    ? '<option value="">— add friends first —</option>'
    : friends.map(f => `<option value="${f}">${f}</option>`).join('');
}

function updateCustomParticipants() {
  const el = document.getElementById('customParticipants');
  el.innerHTML = friends.map(f => `
    <label class="participant-check">
      <input type="checkbox" value="${f}" checked /> ${f}
    </label>
  `).join('');
}

function setSplit(mode, btn) {
  splitMode = mode;
  document.querySelectorAll('.split-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('customParticipants').style.display = mode === 'custom' ? 'flex' : 'none';
}

function addExpense() {
  const desc = document.getElementById('expDesc').value.trim();
  const amount = parseFloat(document.getElementById('expAmount').value);
  const payer = document.getElementById('expPayer').value;

  if (!desc) { alert('Please enter a description.'); return; }
  if (!amount || amount <= 0) { alert('Please enter a valid amount.'); return; }
  if (!payer) { alert('Please add friends first.'); return; }

  let participants;
  if (splitMode === 'all') {
    participants = [...friends];
  } else {
    participants = [...document.querySelectorAll('#customParticipants input:checked')].map(c => c.value);
    if (participants.length === 0) { alert('Select at least one person to split with.'); return; }
  }

  expenses.push({ desc, amount, payer, participants, id: Date.now() });
  document.getElementById('expDesc').value = '';
  document.getElementById('expAmount').value = '';
  renderExpenses();
  hideResults();
}

function removeExpense(id) {
  expenses = expenses.filter(e => e.id !== id);
  renderExpenses();
  hideResults();
}

function renderExpenses() {
  const el = document.getElementById('expensesList');
  if (expenses.length === 0) {
    el.innerHTML = '<div class="empty-state">No expenses yet — add some above!</div>';
    return;
  }
  el.innerHTML = expenses.map(e => `
    <div class="expense-item">
      <div>
        <div class="expense-desc">${e.desc}</div>
        <div class="expense-split">split among: ${e.participants.join(', ')}</div>
      </div>
      <div class="expense-payer">paid by ${e.payer}</div>
      <div class="expense-amount">₹${e.amount.toLocaleString()}</div>
      <button class="delete-btn" onclick="removeExpense(${e.id})" title="Remove">🗑</button>
    </div>
  `).join('');
}

function hideResults() {
  document.getElementById('resultsCard').style.display = 'none';
}

function calculate() {
  if (friends.length < 2) { alert('Add at least 2 friends!'); return; }
  if (expenses.length === 0) { alert('Add at least one expense!'); return; }

  // Calculate balances
  const balances = {};
  friends.forEach(f => balances[f] = 0);

  expenses.forEach(e => {
    const share = e.amount / e.participants.length;
    e.participants.forEach(p => {
      balances[p] -= share;
    });
    balances[e.payer] += e.amount;
  });

  // Total spent
  const total = expenses.reduce((s, e) => s + e.amount, 0);

  // Stats
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-box">
      <div class="stat-value">₹${total.toLocaleString()}</div>
      <div class="stat-label">Total Spent</div>
    </div>
    <div class="stat-box">
      <div class="stat-value">${expenses.length}</div>
      <div class="stat-label">Expenses</div>
    </div>
    <div class="stat-box">
      <div class="stat-value">${friends.length}</div>
      <div class="stat-label">People</div>
    </div>
  `;

  // Render balances
  document.getElementById('balancesList').innerHTML = friends.map(f => {
    const b = balances[f];
    const cls = b > 0.005 ? 'balance-positive' : b < -0.005 ? 'balance-negative' : 'balance-zero';
    const label = b > 0.005 ? `gets back ₹${b.toFixed(0)}` : b < -0.005 ? `owes ₹${Math.abs(b).toFixed(0)}` : 'settled ✓';
    return `
      <div class="balance-row">
        <span class="balance-name">${f}</span>
        <span class="${cls}">${label}</span>
      </div>`;
  }).join('');

  // Settle up algorithm
  const settlements = [];
  const pos = [], neg = [];
  Object.entries(balances).forEach(([name, bal]) => {
    if (bal > 0.005) pos.push({ name, bal });
    else if (bal < -0.005) neg.push({ name, bal: -bal });
  });

  pos.sort((a,b) => b.bal - a.bal);
  neg.sort((a,b) => b.bal - a.bal);

  let i = 0, j = 0;
  while (i < pos.length && j < neg.length) {
    const amount = Math.min(pos[i].bal, neg[j].bal);
    if (amount > 0.005) {
      settlements.push({ from: neg[j].name, to: pos[i].name, amount });
    }
    pos[i].bal -= amount;
    neg[j].bal -= amount;
    if (pos[i].bal < 0.005) i++;
    if (neg[j].bal < 0.005) j++;
  }

  document.getElementById('settlementsList').innerHTML = settlements.length === 0
    ? '<div class="empty-state">Everyone is settled! 🎉</div>'
    : settlements.map(s => `
        <div class="settlement-item">
          <span class="settlement-from">💸 ${s.from}</span>
          <span class="settlement-arrow">→</span>
          <span class="settlement-to">${s.to}</span>
          <span class="settlement-amount">₹${s.amount.toFixed(0)}</span>
        </div>
      `).join('');

  document.getElementById('resultsCard').style.display = 'block';
  document.getElementById('resultsCard').scrollIntoView({ behavior: 'smooth' });
}

function resetAll() {
  if (!confirm('Reset everything?')) return;
  friends = [];
  expenses = [];
  splitMode = 'all';
  renderFriends();
  renderExpenses();
  updatePayerSelect();
  updateCustomParticipants();
  hideResults();
  document.getElementById('expDesc').value = '';
  document.getElementById('expAmount').value = '';
  document.querySelectorAll('.split-btn').forEach((b,i) => b.classList.toggle('active', i===0));
  document.getElementById('customParticipants').style.display = 'none';
}
</script>
</body>
</html>
